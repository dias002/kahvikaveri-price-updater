name: Kahvikaveri — обновление цен

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: "Начать с ID товара (пусто = с начала)"
        required: false
        default: ""
      limit:
        description: "Максимум товаров (пусто = все)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (без записи в БД)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install curl_cffi beautifulsoup4 mysql-connector-python

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Setup SSH tunnel to DB
        env:
          SSH_PASS: ${{ secrets.SSH_PASS }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DB_HOST: ${{ secrets.DB_HOST }}
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -L 3307:$DB_HOST:3306 \
            $SSH_USER@$SSH_HOST \
            -N -f
          sleep 3
          echo "SSH tunnel ready"

      - name: Run price update
        id: price_update
        env:
          DB_HOST: "127.0.0.1"
          DB_PORT: "3307"
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.start_id }}" ]; then
            ARGS="$ARGS --start-id ${{ github.event.inputs.start_id }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -u update_prices.py $ARGS 2>&1 | tee /tmp/price_output.txt

      - name: Write summary
        if: always()
        run: |
          echo "## Результат обновления цен" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "Товаров|Готово|ошибка|снят с публикации|EUR" /tmp/price_output.txt | tail -50 >> $GITHUB_STEP_SUMMARY || echo "Лог недоступен" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Скрипт завершился с ошибкой! Проверь логи выше."
          grep -E "ошибка|Error|Traceback" /tmp/price_output.txt | tail -20 || true
